[[production]]
name = "entry"
type = "pure"
replacements = ["replacement", "replacement1"]
terminals = ["terminal", "terminal1"]

[[production]]
name = "weighted production"
type = "weighted"
replacements = [
  { string = "replacement1", weight = 1 },
  { string = "replacement2", weight = 2 }
]
terminals = [
  { string = "terminal1", weight = 1 },
  { string = "terminal2", weight = 2 }
]

[[production]]
name = "range production"
type = "range"
lower_bound = -10
upper_bound = 10

[[production]]
name = "janet production"
type = "janet"
replacement = '''#replacement script
  (print "replacement")
'''
terminal = '''#terminal script
  (print "terminal")
'''
