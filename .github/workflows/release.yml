name: Create release

on:
    workflow_dispatch:
        inputs:
            branch:
                description: "Branch to release"
                required: true
                type: choice
                default: main
                options:
                    - main
                    # You can add more options here if you need to test on different SDK versions
            do_release:
                description: 'Create Release (must also select Tag above!")'
                required: true
                default: false
                type: boolean

permissions:
    pages: write
    id-token: write
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 0

            - name: Check Nixpkgs inputs
              uses: DeterminateSystems/flake-checker-action@main
              with:
                  fail-mode: true

            - name: Install Nix
              uses: DeterminateSystems/nix-installer-action@main

            - name: Build
              run: |
                  nix develop --command \
                      just build_all

            - name: Check
              run: |
                  nix develop --command \
                      just check

            - name: Test
              run: |
                  nix develop --command \
                    just test_all

            - name: Docs html
              run: |
                  nix develop --command \
                    just html

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./.build/docs

            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v4

            - name: Release
              if: startsWith(github.ref, 'refs/tags/') && inputs.do_release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  make_latest: true
                  files: |
                      .build/Release/pdgl_cli 
                      .build/Emscripten/pdgl_wasm.js

    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 0 # GitHub Actions example:

            - uses: MinoruSekine/setup-scoop@v4.0.2
              name: Install scoop with uutils-coreutils
              with:
                  buckets: extras
                  apps: uutils-coreutils

            - name: Install python requirements
              run: pip install -r requirements.txt

            - name: Install lizard
              run: pip install lizard

            - name: Install xxd and findutils
              run: choco install xxd

            - name: Build cmake
              shell: cmd
              run: cmake -B.\.build\Release -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_COLOR_DIAGNOSTICS=TRUE -G Ninja

            - name: Build source
              shell: cmd
              run: cmake --build .\.build\Release -j

            - name: run tests
              shell: cmd
              run: |
                  python .\misc\test\win_runner.py

            - name: Release
              if: startsWith(github.ref, 'refs/tags/') && inputs.do_release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      .build/Release/pdgl_cli.exe
